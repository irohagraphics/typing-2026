    // フォントサイズの動的決定
    function getRomajiStyle(text) {
      const len = text.length;
      if (len > 25) return "text-lg sm:text-xl md:text-2xl tracking-normal";
      if (len > 18) return "text-xl sm:text-2xl md:text-3xl tracking-tight";
      if (len > 12) return "text-2xl sm:text-3xl md:text-4xl tracking-normal";
      return "text-3xl sm:text-4xl md:text-5xl tracking-widest";
    }

    // ランク判定
    function getRank() {
      const qCount = stats.questionsCleared;
      if (qCount >= 35) return { title: "伝説の唐津っ子", color: "text-red-600", desc: "がばい凄か！神の領域たい！383町名を完全に制覇したも同然ばい！" };
      if (qCount >= 25) return { title: "唐津大好き民", color: "text-orange-500", desc: "素晴らしい！唐津全域を隅々まで知り尽くしとるばい！" };
      if (qCount >= 18) return { title: "地名マスター", color: "text-emerald-600", desc: "なかなかの実力たい。あんた、地元のことよう知っとるね！" };
      if (qCount >= 11) return { title: "地元住民", color: "text-blue-500", desc: "立派な地元民たい。さらに上を目指して頑張らんば！" };
      if (qCount >= 6) return { title: "見習い調査員", color: "text-amber-600", desc: "少しずつ地名を覚えてきたね。その調子たい！" };
      return { title: "地名初級者", color: "text-slate-500", desc: "まずは地元周辺の町名から覚えんば。また挑戦してね！" };
    }

    const calculateAccuracy = () => stats.totalChars === 0 ? 100 : Math.floor((stats.correctChars / stats.totalChars) * 100);

      const timeSpent = INITIAL_TIME - timeLeft;
      return timeSpent <= 0 ? 0 : (stats.correctChars / timeSpent).toFixed(1);

    // --- プレイ中の動的UI更新 ---
    function updatePlayingUI(isQuestionChange = false) {
      if (gameState !== 'playing') return;
      const activeQ = gameQuestions[currentQuestionIndex];
      if (!activeQ) return;

      if (isQuestionChange) {
        document.getElementById('area-display').innerText = activeQ.area || "不明";
        document.getElementById('pop-display').innerText = activeQ.pop || "---";
        document.getElementById('no-display').innerText = activeQ.no || "?";
        document.getElementById('name-display').innerText = activeQ.name;
        document.getElementById('reading-display').innerText = activeQ.reading;
        
        const romajiContainer = document.getElementById('romaji-display');
        romajiContainer.className = `relative z-10 flex flex-wrap justify-center items-center leading-relaxed ${getRomajiStyle(activeQ.romaji)}`;
      }

      const target = activeQ.romaji;
      const typed = target.slice(0, userInput.length);
      const current = target[userInput.length] || "";
      const remaining = target.slice(userInput.length + 1);

      document.getElementById('romaji-display').innerHTML = `
        <span class="text-emerald-500 font-black whitespace-pre">${typed}</span>
        <span class="text-white border-b-4 border-emerald-500 mx-0.5 whitespace-pre">${current}</span>
        <span class="text-neutral-700 whitespace-pre">${remaining}</span>
      `;

      document.getElementById('clear-count').innerText = stats.questionsCleared;
      document.getElementById('combo-count').innerText = stats.combo;
    }

    function updateTimerUI() {
      if (gameState !== 'playing') return;
      const timeDisplay = document.getElementById('time-display');
      const timeBar = document.getElementById('time-bar');
      if (timeDisplay && timeBar) {
        if (timeLeft <= 10) {
          timeDisplay.className = 'text-5xl md:text-6xl font-black font-mono transition-colors text-red-500 animate-pulse';
          timeBar.className = 'h-full transition-all duration-1000 ease-linear bg-red-500';
        } else {
          timeDisplay.className = 'text-5xl md:text-6xl font-black font-mono transition-colors text-emerald-400';
          timeBar.className = 'h-full transition-all duration-1000 ease-linear bg-emerald-500';
        }
        timeDisplay.innerHTML = `${timeLeft}<span class="text-xl ml-1">s</span>`;
        timeBar.style.width = `${(timeLeft / INITIAL_TIME) * 100}%`;
      }
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          showResult();
        }
      }, 1000);
    }

    function startGame() {
      if (QUESTIONS.length === 0) return;
      gameQuestions = [...QUESTIONS].sort(() => Math.random() - 0.5);
      currentQuestionIndex = 0;
      userInput = "";
      timeLeft = INITIAL_TIME;
      stats = { correctChars: 0, totalChars: 0, missedChars: 0, combo: 0, maxCombo: 0, questionsCleared: 0 };
      
      gameState = 'playing';
      showPlaying();
      updatePlayingUI(true);
      updateTimerUI();
      startTimer();
    }

    // --- キーボード入力処理 ---
    window.addEventListener('keydown', (e) => {
      if (gameState !== 'playing') return;
      if (['Shift', 'Control', 'Alt', 'Meta', 'CapsLock', 'Tab'].includes(e.key)) return;

      const currentQ = gameQuestions[currentQuestionIndex];
      if (!currentQ || !currentQ.romaji) return;

      const target = currentQ.romaji;
      const nextChar = target[userInput.length];

      if (e.key.toLowerCase() === nextChar) {
        userInput += e.key.toLowerCase();
        stats.correctChars++;
        stats.totalChars++;
        stats.combo++;
        stats.maxCombo = Math.max(stats.maxCombo, stats.combo);

        if (userInput === target) {
          stats.questionsCleared++;
          updatePlayingUI(false);
          
          setTimeout(() => {
            currentQuestionIndex = (currentQuestionIndex + 1) % gameQuestions.length;
            userInput = "";
            updatePlayingUI(true);
          }, 80);
        } else {
          updatePlayingUI(false);
        }
      } else {
        stats.totalChars++;
        stats.missedChars++;
        stats.combo = 0;
        updatePlayingUI(false);
      }
    });

    // --- 初期化処理 ---
    window.onload = () => {
      initBackground();
      showTitle();
    };
  </script>
</body>
</html>
